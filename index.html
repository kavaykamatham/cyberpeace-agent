<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberPeace - Scam Detection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 700px;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-btn:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .file-upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f9f9f9;
        }

        .file-upload-area:hover {
            background: #f0f0ff;
            border-color: #764ba2;
        }

        .file-upload-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
        }

        .file-upload-area p {
            margin: 0;
            color: #333;
            font-weight: 600;
            font-size: 16px;
        }

        .file-upload-area small {
            display: block;
            margin-top: 8px;
            color: #999;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-section label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .analyze-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .analyze-btn:active {
            transform: translateY(0);
        }

        .analyze-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .clear-btn {
            background: #f0f0f0;
            color: #333;
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-section {
            display: none;
        }

        .verdict {
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 16px;
        }

        .verdict.safe {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }

        .verdict.warning {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffc107;
        }

        .verdict.danger {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #dc3545;
        }

        .result-item {
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .result-item h3 {
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-item p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .confidence {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .scam-types {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .tag {
            background: #e0e0e0;
            color: #333;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .urls-list {
            list-style: none;
        }

        .urls-list li {
            padding: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            margin-bottom: 8px;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
        }

        .risk-explanation {
            background: #fffbea;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #ffc107;
        }

        .risk-explanation h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .risk-explanation p {
            color: #555;
            line-height: 1.6;
            font-size: 14px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #dc3545;
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ CyberPeace</h1>
            <p>Detect Scams & Spam Messages in Real-Time</p>
        </div>

        <div class="input-section">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('text')">📝 Text Message</button>
            <button class="tab-btn" onclick="switchTab('file')">📁 Upload File</button>
        </div>

        <!-- TEXT INPUT TAB -->
        <div class="tab-content active" id="textTab">
            <div class="input-section">
                <label for="messageInput">Enter Message to Analyze:</label>
                <textarea id="messageInput" placeholder="Paste the message you want to check..."></textarea>
            </div>

            <div class="button-group">
                <button class="analyze-btn" onclick="analyzeMessage()">Analyze Message</button>
                <button class="clear-btn" onclick="clearAll()">Clear</button>
            </div>
        </div>

        <!-- FILE UPLOAD TAB -->
        <div class="tab-content" id="fileTab">
            <div class="input-section">
                <label for="fileInput">Upload File:</label>
                <div class="file-upload-area" id="dropZone">
                    <input type="file" id="fileInput" accept=".txt,.csv,.pdf,.jpg,.jpeg,.png,.gif,.bmp" style="display:none;">
                    <p>📂 Drop files here or click to browse</p>
                    <small>Supported: Images (JPG, PNG), Text files, PDF</small>
                </div>
                <div id="fileName" style="margin-top:10px; color:#666; font-size:14px;"></div>
            </div>

            <div class="button-group">
                <button class="analyze-btn" onclick="analyzeFile()">Analyze File</button>
                <button class="clear-btn" onclick="clearFile()">Clear</button>
            </div>
        </div>

        <div class="error" id="errorBox"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing message...</p>
        </div>

        <div class="result-section" id="resultSection">
            <div class="verdict" id="verdict"></div>

            <div class="result-item">
                <h3>Analysis Result</h3>
                <p><strong>Scam Detected:</strong> <span id="isScam">-</span></p>
                <p><strong>Confidence:</strong> <span id="confidence">-</span></p>
            </div>

            <div class="result-item" id="scamTypesDiv" style="display:none;">
                <h3>Scam Types Detected</h3>
                <div class="scam-types" id="scamTypes"></div>
            </div>

            <div class="result-item" id="urlsDiv" style="display:none;">
                <h3>URLs Found</h3>
                <ul class="urls-list" id="urlsList"></ul>
            </div>

            <div class="risk-explanation" id="riskDiv" style="display:none;">
                <h3>⚠️ Risk Assessment</h3>
                <p id="riskText"></p>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            event.target.classList.add('active');
        }

        // File upload handling
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelect(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            selectedFile = file;
            document.getElementById('fileName').textContent = `✅ Selected: ${file.name} (${formatFileSize(file.size)})`;
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        async function analyzeFile() {
            if (!selectedFile) {
                showError('Please select a file to analyze');
                return;
            }

            const loading = document.getElementById('loading');
            const errorBox = document.getElementById('errorBox');
            const resultSection = document.getElementById('resultSection');

            errorBox.style.display = 'none';
            resultSection.style.display = 'none';
            loading.style.display = 'block';

            try {
                const fileType = selectedFile.type;
                const fileName = selectedFile.name;
                let textContent = '';

                // Handle different file types
                if (fileType.startsWith('image/')) {
                    // For images, convert to base64 and send
                    textContent = await processImage(selectedFile);
                } else if (fileType === 'text/plain' || fileName.endsWith('.csv')) {
                    // For text files, read directly
                    textContent = await readTextFile(selectedFile);
                } else if (fileName.endsWith('.pdf')) {
                    textContent = `[PDF File: ${fileName}] Please extract text manually or use PDF reader`;
                } else {
                    throw new Error('Unsupported file type. Use image, text, or PDF files.');
                }

                if (!textContent) {
                    throw new Error('Could not extract text from file');
                }

                // Analyze the extracted content
                const response = await fetch('http://localhost:3000/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: textContent })
                });

                if (!response.ok) {
                    throw new Error('Server error: ' + response.statusText);
                }

                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error);
                }

                displayResult(result);
                errorBox.style.display = 'none';

            } catch (error) {
                console.error('Error:', error);
                showError(error.message);
            } finally {
                loading.style.display = 'none';
            }
        }

        async function processImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    // For images, we'll send metadata about the image
                    // In a real scenario, you'd use OCR or send to a vision API
                    const imageName = file.name;
                    const imageSize = file.size;
                    const message = `[Screenshot/Image Analysis] File: ${imageName}, Size: ${formatFileSize(imageSize)}. Please verify the content and any text visible in this image for scam indicators.`;
                    resolve(message);
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function readTextFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    resolve(e.target.result);
                };
                reader.onerror = () => {
                    reject(new Error('Failed to read file'));
                };
                reader.readAsText(file);
            });
        }

        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = '❌ Error: ' + message;
            errorBox.style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
        }

        async function analyzeMessage() {
            const message = document.getElementById('messageInput').value.trim();
            const errorBox = document.getElementById('errorBox');
            const loading = document.getElementById('loading');
            const resultSection = document.getElementById('resultSection');

            // Validation
            if (!message) {
                showError('Please enter a message to analyze');
                return;
            }

            if (message.length < 5) {
                showError('Message too short. Please enter at least 5 characters');
                return;
            }

            // Show loading
            errorBox.style.display = 'none';
            resultSection.style.display = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch('http://localhost:3000/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message })
                });

                if (!response.ok) {
                    throw new Error('Server error: ' + response.statusText);
                }

                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error);
                }

                displayResult(result);
                errorBox.style.display = 'none';

            } catch (error) {
                console.error('Error:', error);
                showError(error.message + ' (Make sure server is running on http://localhost:3000)');
            } finally {
                loading.style.display = 'none';
            }
        }

        function displayResult(result) {
            const resultSection = document.getElementById('resultSection');
            const verdict = document.getElementById('verdict');
            const isScam = result.analysis.isScamQuery;
            const confidence = result.analysis.confidence || 0;

            // Determine verdict
            let verdictClass, verdictText;
            if (!isScam) {
                verdictClass = 'safe';
                verdictText = '✅ SAFE - This appears to be legitimate';
            } else if (result.urlChecks && result.urlChecks.length > 0) {
                const allSafe = result.urlChecks.every(check => !check.virusTotalData || check.virusTotalData.stats.malicious === 0);
                if (allSafe) {
                    verdictClass = 'warning';
                    verdictText = '⚠️ WARNING - Possible scam, but URLs appear safe (check links carefully)';
                } else {
                    verdictClass = 'danger';
                    verdictText = '🚨 DANGER - Scam detected with potentially malicious URLs!';
                }
            } else {
                verdictClass = 'warning';
                verdictText = '⚠️ WARNING - This looks like a potential scam. Be careful!';
            }

            verdict.className = 'verdict ' + verdictClass;
            verdict.textContent = verdictText;

            // Set analysis info
            document.getElementById('isScam').textContent = isScam ? '🔴 Yes' : '🟢 No';
            document.getElementById('confidence').innerHTML = `<span class="confidence">${confidence}% Confidence</span>`;

            // Show scam types
            const scamTypesDiv = document.getElementById('scamTypesDiv');
            if (result.analysis.scamTypes && result.analysis.scamTypes.length > 0) {
                const scamTypesContainer = document.getElementById('scamTypes');
                scamTypesContainer.innerHTML = result.analysis.scamTypes
                    .map(type => `<span class="tag">${type}</span>`)
                    .join('');
                scamTypesDiv.style.display = 'block';
            } else {
                scamTypesDiv.style.display = 'none';
            }

            // Show URLs
            const urlsDiv = document.getElementById('urlsDiv');
            if (result.extractedUrls && result.extractedUrls.length > 0) {
                const urlsList = document.getElementById('urlsList');
                urlsList.innerHTML = result.extractedUrls
                    .map(url => `<li>🔗 ${url}</li>`)
                    .join('');
                urlsDiv.style.display = 'block';
            } else {
                urlsDiv.style.display = 'none';
            }

            // Show risk explanation
            const riskDiv = document.getElementById('riskDiv');
            if (result.riskExplanation) {
                document.getElementById('riskText').textContent = result.riskExplanation;
                riskDiv.style.display = 'block';
            } else {
                riskDiv.style.display = 'none';
            }

            resultSection.style.display = 'block';
        }

        function clearAll() {
            document.getElementById('messageInput').value = '';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('errorBox').style.display = 'none';
            document.getElementById('messageInput').focus();
        }

        function clearFile() {
            selectedFile = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('fileName').textContent = '';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('errorBox').style.display = 'none';
        }

        // Allow Enter key to send
        document.getElementById('messageInput').addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && event.ctrlKey) {
                analyzeMessage();
            }
        });
    </script>
</body>
</html>
